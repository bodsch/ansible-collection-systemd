---

- name: merge systemd networkd configuration between defaults and custom
  ansible.builtin.set_fact:
    systemd_networkd: "{{ systemd_defaults_networkd | combine(systemd_networkd, recursive=True) }}"

- name: create systemd networkd configuration
  ansible.builtin.template:
    src: systemd/networkd.conf.j2
    dest: /etc/systemd/networkd.conf
    mode: "0644"
    owner: root
    group: root

- name: manage all systemd-networkd profiles in a single call
  bodsch.systemd.networkd_profiles:
    profiles:
      link: "{{ systemd_networkd_profiles.link | default({}) }}"
      netdev: "{{ systemd_networkd_profiles.netdev | default({}) }}"
      network: "{{ systemd_networkd_profiles.network | default({}) }}"
    directory: /etc/systemd/network
    mode: "0644"
    purge: "{{ systemd_networkd_profiles.purge | default(false) | bool }}"
    validate: "{{ systemd_networkd_profiles.validate | default(false) | bool }}"
    validate_strict: "{{ systemd_networkd_profiles.validate_strict | default(false) | bool }}"
    validate_timeout: 30
  when:
    - systemd_networkd_profiles is defined
  register: systemd_networkd_profiles_changed

- name: enable systemd-resolved
  when:
    - systemd_networkd_profiles.enable_resolved | default(false) | bool
  ansible.builtin.systemd:
    name: systemd-resolved
    enabled: true
    state: started

